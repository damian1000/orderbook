// The order-book library: book, engine, model, market, view - plus the JMH benchmarks that
// measure it. No web, no Kafka, no entry point; this is the module published for consumers
// (JitPack builds it from a tag), and its only runtime dependency is the Disruptor.
plugins {
    id 'io.github.damian1000.kotlin-conventions'
    id 'java-library'
    id 'me.champeau.jmh'
    id 'maven-publish'
}

group = 'io.github.damian1000'
version = '1.0.0'

java {
    withSourcesJar() // so a consumer's IDE can navigate the source
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8"
    implementation 'com.lmax:disruptor:4.0.0'

    testImplementation deps.hamcrest
}

jmh {
    fork = 1
    warmupIterations = 3
    iterations = 5
    // No benchmarkMode here: the plugin passes it as -bm, which overrides every class's
    // @BenchmarkMode annotation (it is not a fallback default). Each benchmark declares its
    // own mode — SampleTime for the tail-latency runs, Throughput for the contended run,
    // AverageTime for the sub-µs raw book ops.
    timeUnit = 'us'
    profilers = ['gc'] // allocations/op (gc.alloc.rate.norm) + GC pause stats on every benchmark
    resultFormat = 'JSON'
    resultsFile = project.file("${buildDir}/reports/jmh/results.json")
}

// No remote repository: JitPack builds from the git tag, so publishing exists only for
// publishToMavenLocal (local verification and a consumer dry run).
publishing {
    publications {
        maven(MavenPublication) {
            from components.java
            // Not the bare project name 'core': both this repo and risk-engine publish a :core,
            // and the artifactId is what keeps them distinct in a local repository.
            artifactId = 'orderbook-core'
        }
    }
}
